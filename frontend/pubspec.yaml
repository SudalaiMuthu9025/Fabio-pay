name: fabio
description: "Fabio — FinTech Biometric Payment App"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # ── Camera & Face Detection ────────────────────────────────────────────
  camera: ^0.11.0+2
  image: ^4.3.0
  google_mlkit_face_detection: ^0.11.0

  # ── Networking ─────────────────────────────────────────────────────────
  dio: ^5.7.0
  web_socket_channel: ^3.0.1       # ← ADDED: required by liveness_screen.dart

  # ── State Management ───────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Secure Storage & Auth ──────────────────────────────────────────────
  flutter_secure_storage: ^9.2.3

  # ── Utilities ──────────────────────────────────────────────────────────
  intl: ^0.19.0

  # ── Receipts & Sharing ─────────────────────────────────────────────────
  share_plus: ^10.1.3
  path_provider: ^2.1.5

  # ── Charts & Analytics ─────────────────────────────────────────────────
  fl_chart: ^0.69.2

  # ── QR Code ────────────────────────────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # ── Biometric Auth ─────────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Notifications ──────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Onboarding ─────────────────────────────────────────────────────────
  smooth_page_indicator: ^1.2.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
